[build]
  command = "rm -rf node_modules .next && npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Redirect specific API routes to external backend (exclude auth routes)
# Keep /api/ai/* on Netlify (frontend AI routes)
# Removed study-buddy redirects to use Next.js API routes directly

[[redirects]]
  from = "/api/curate-resources/*"
  to = "https://focus-mentor.onrender.com/api/curate-resources/:splat"
  status = 200

[[redirects]]
  from = "/api/generate-plan/*"
  to = "https://focus-mentor.onrender.com/api/generate-plan/:splat"
  status = 200

[[redirects]]
  from = "/api/study-plan/*"
  to = "https://focus-mentor.onrender.com/api/study-plan/:splat"
  status = 200

[[redirects]]
  from = "/api/pdf-chat/*"
  to = "https://focus-mentor.onrender.com/api/pdf-chat/:splat"
  status = 200

[[redirects]]
  from = "/api/syllabus/*"
  to = "https://focus-mentor.onrender.com/api/syllabus/:splat"
  status = 200

[[redirects]]
  from = "/api/meeting-rooms/*"
  to = "https://focus-mentor.onrender.com/api/meeting-rooms/:splat"
  status = 200

# Keep auth routes on Netlify (NextAuth handles these)
# /api/auth/* stays on Netlify

# Handle Next.js client-side routing  
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200