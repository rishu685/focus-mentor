[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"

# Redirect API calls to external backend
[[redirects]]
  from = "/api/*"
  to = "https://focus-mentor.onrender.com/api/:splat"
  status = 200

# Handle Next.js client-side routing  
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200