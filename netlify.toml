[build]
  command = "rm -rf node_modules .next && npm ci --include=dev && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_BACKEND_URL = "https://focus-mentor-backend.onrender.com"

# All API routes are handled by Next.js API routes which proxy to external backend
# No external redirects needed - Next.js handles the proxying internally

# Handle Next.js client-side routing  
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200